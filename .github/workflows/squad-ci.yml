name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  integration-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Leagues Rollout Gates Policy Check
        run: python3 .github/scripts/validate_leagues_rollout_gates.py

      - name: Restore
        run: dotnet restore src/CardGames.sln

      - name: Build
        run: dotnet build src/CardGames.sln --configuration Release --no-restore

      - name: Leagues P0 Integration Quality Gate
        run: dotnet test src/Tests/CardGames.IntegrationTests/CardGames.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx"
